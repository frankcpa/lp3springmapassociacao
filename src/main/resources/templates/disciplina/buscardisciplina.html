<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layoutprincipal.html}">

<head>
    <title>Manter Disciplinas</title>
</head>

<body>
    <div class=" container" layout:fragment="conteudoprincipal">
        <div class="p-4 p-md-5 mt-4 mb-4 rounded text-body-emphasis bg-body-secondary">
            <div class="col-lg-6 px-0">
                <h1 class="display-4 fst-italic">Manter Disciplinas</h1>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nome</th>
                    <th scope="col">Descrição</th>
                    <th scope="col">Carga Horária</th>
                    <th scope="col">Professor</th>
                    <th scope="col"></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="disciplina : ${disciplinas}">
                    <th scope="row"><span th:text="${disciplina.idDisciplina}"></span></th>
                    <td><span th:text="${disciplina.nome}"></span></td>
                    <td><span th:text="${disciplina.descricao}"></span></td>
                    <td><span th:text="${disciplina.cargaHoraria}"></span></td>
                    <td><span th:text="${disciplina.professor.nome}"></span></td>
                    <td>
                        <form th:action="@{/editardisciplina/{id}(id=${disciplina.idDisciplina})}" method="get"
                            onsubmit="return confirm('Deseja realmente editar esta disciplina?');">
                            <button type="submit" class="btn btn-warning">Editar</button>
                        </form>
                    </td>
                    <td>
                        <form th:action="@{/removerdisciplina/{id}(id=${disciplina.idDisciplina})}" method="get"
                            onsubmit="return confirm('Deseja realmente remover esta disciplina?');">
                            <button type="submit" class="btn btn-danger">Remover</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    </div>
</body>

</html>
